
<style>

  #mobile-controls{position:absolute;bottom:0;left:0;width:100%;pointer-events:none;display:none}

  #joystick-bg{width:100px;height:100px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);border-radius:50%}

  #fire-btn{position:absolute;bottom:20px;right:20px;width:64px;height:64px;background:rgba(255,50,50,0.5);border:2px solid rgba(255,80,80,0.8);border-radius:50%;pointer-events:all;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:bold}
  @media(max-width:600px){#mobile-controls{display:block}}
</style>

<h2 class="sr-only">PUBG-style top-down battle royale browser game. Use WASD to move, mouse to aim and shoot, collect loot, survive the zone.</h2>
<div id="game-wrap">
  <canvas id="canvas" width="680" height="480"></canvas>
  <div id="ui">
    <div id="hud-top">
      <div class="hud-box" id="alive-box">🟡 Players: <span id="alive-count">20</span></div>
      <div class="hud-box" id="zone-box">Zone: <span id="zone-timer">60</span>s</div>
      <div class="hud-box" id="kills-box">Kills: <span id="kill-count">0</span></div>
    </div>
    <div id="kill-feed"></div>
    <div id="zone-warn" id="zone-warn">⚠ MOVE TO SAFE ZONE!</div>
    <div id="hud-bot">
      <div id="healthbar-wrap">
        <div style="font-size:11px;color:#aaa;margin-bottom:2px">HP <span id="hp-num">100</span></div>
        <div id="healthbar-bg"><div id="healthbar" style="width:100%"></div></div>
        <div style="font-size:11px;color:#55aaff;margin-top:2px">ARMOR <span id="armor-num">100</span></div>
        <div id="armorbar-bg"><div id="armorbar" style="width:100%"></div></div>
      </div>
      <div id="ammo-box">🔫 <span id="ammo-cur">30</span>/<span id="ammo-res">90</span></div>
      <div id="minimap-wrap"><canvas id="minimap" width="100" height="100"></canvas></div>
    </div>
    <div id="overlay">
      <h1>BATTLEGROUNDS</h1>
      <p>WASD = Move &nbsp;|&nbsp; Mouse = Aim &nbsp;|&nbsp; Click = Shoot<br>R = Reload &nbsp;|&nbsp; E = Loot</p>
      <button id="start-btn">PLAY NOW</button>
    </div>
  </div>
  <div id="mobile-controls">
    <div id="joystick-zone">
      <div id="joystick-bg"><div id="joystick-knob"></div></div>
    </div>
    <div id="fire-btn">FIRE</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const mm = document.getElementById('minimap');
const mctx = mm.getContext('2d');

const W = 680, H = 480;
const WORLD = 1400;

let state = 'menu';
let keys = {};
let mouseX = W/2, mouseY = H/2;
let mouseDown = false;
let camX = 0, camY = 0;
let kills = 0;
let zoneTimer = 60;
let zonePhase = 0;
let lastZone = 0;
let shootCooldown = 0;
let reloading = false;
let reloadTimer = 0;
let lastShot = 0;
let gameTime = 0;
let killFeedEntries = [];

const ZONE_PHASES = [
  {delay:0,  from:{cx:700,cy:700,r:660}, to:{cx:700,cy:700,r:500}},
  {delay:30, from:{cx:700,cy:700,r:500}, to:{cx:680,cy:720,r:320}},
  {delay:20, from:{cx:680,cy:720,r:320}, to:{cx:660,cy:700,r:180}},
  {delay:15, from:{cx:660,cy:700,r:180}, to:{cx:660,cy:700,r:80}},
  {delay:10, from:{cx:660,cy:700,r:80},  to:{cx:660,cy:700,r:20}},
];
let zone = {...ZONE_PHASES[0].from};
let zoneTarget = {...ZONE_PHASES[0].to};
let zonePhaseIdx = 0;
let zoneShrinkProgress = 0;
let zoneShrinkDuration = 15;

const TREES = [], BUILDINGS = [], LOOT = [], BULLETS = [], ENEMIES = [], PARTICLES = [];

const player = {
  x:700,y:700,hp:100,maxHp:100,armor:100,maxArmor:100,
  ammo:30,ammoRes:90,speed:3,angle:0,
  r:10,dead:false,inZone:true,
  zoneTimer:0,reloadTimer:0,shooting:false
};

const names = ['Wolf','Hawk','Viper','Ghost','Raven','Steel','Blaze','Storm','Frost','Razor','Echo','Shade','Drift','Surge','Venom','Titan','Apex','Null','Grid','Cruz'];

function rnd(a,b){return a+Math.random()*(b-a)}
function rndInt(a,b){return Math.floor(rnd(a,b))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function spawnWorld(){
  TREES.length=0; BUILDINGS.length=0; LOOT.length=0;
  for(let i=0;i<200;i++) TREES.push({x:rnd(50,1350),y:rnd(50,1350),r:rnd(10,20),c:rnd(0.3,0.8)});
  for(let i=0;i<25;i++){
    let bx=rnd(80,1300),by=rnd(80,1300);
    BUILDINGS.push({x:bx,y:by,w:rnd(60,120),h:rnd(50,100)});
  }
  for(let i=0;i<60;i++){
    LOOT.push({x:rnd(100,1300),y:rnd(100,1300),type:['ammo','hp','armor'][rndInt(0,3)],r:7,collected:false});
  }
}

function spawnEnemies(){
  ENEMIES.length=0;
  for(let i=0;i<19;i++){
    let ex,ey;
    do{ ex=rnd(100,1300); ey=rnd(100,1300); }while(dist({x:ex,y:ey},player)<200);
    ENEMIES.push({
      x:ex,y:ey,hp:80+i*2,maxHp:80+i*2,r:10,angle:0,
      ammo:20,dead:false,name:names[i],
      speed:1+Math.random()*0.8,
      fireRate:80+rndInt(0,80),
      fireCooldown:rndInt(0,60),
      inZone:true,alertRadius:180+Math.random()*120,
      state:'wander',wanderTarget:{x:ex,y:ey},wanderTimer:0,
      armor:rndInt(0,60)
    });
  }
}

function startGame(){
  player.x=700;player.y=700;player.hp=100;player.armor=100;
  player.ammo=30;player.ammoRes=90;player.dead=false;
  kills=0;zoneTimer=60;zonePhaseIdx=0;zoneShrinkProgress=0;
  zoneTimer=60;lastZone=0;gameTime=0;reloading=false;
  zone={...ZONE_PHASES[0].from};
  zoneTarget={...ZONE_PHASES[0].to};
  BULLETS.length=0; PARTICLES.length=0; killFeedEntries.length=0;
  spawnWorld(); spawnEnemies();
  state='playing';
  document.getElementById('overlay').style.display='none';
  document.getElementById('zone-warn').style.opacity='0';
  updateHUD();
}

function updateHUD(){
  document.getElementById('alive-count').textContent = ENEMIES.filter(e=>!e.dead).length+1;
  document.getElementById('kill-count').textContent = kills;
  document.getElementById('hp-num').textContent = Math.ceil(player.hp);
  document.getElementById('armor-num').textContent = Math.ceil(player.armor);
  document.getElementById('healthbar').style.width = (player.hp/player.maxHp*100)+'%';
  document.getElementById('healthbar').style.background = player.hp>50?'#2ecc40':player.hp>25?'#ffb700':'#ff4136';
  document.getElementById('armorbar').style.width = (player.armor/player.maxArmor*100)+'%';
  document.getElementById('ammo-cur').textContent = reloading?'..':player.ammo;
  document.getElementById('ammo-res').textContent = player.ammoRes;
  document.getElementById('zone-timer').textContent = Math.ceil(zoneTimer);
}

function inCircle(x,y,c){return dist({x,y},c)<=c.r}

function isInZone(obj){return inCircle(obj.x,obj.y,zone)}

function fireBullet(from,angle,isPlayer){
  BULLETS.push({
    x:from.x,y:from.y,
    vx:Math.cos(angle)*12,vy:Math.sin(angle)*12,
    life:55,isPlayer,
    dmg:isPlayer?25:15
  });
}

function spawnBlood(x,y,n=5){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,sp=rnd(1,4);
    PARTICLES.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:20,col:'#cc2200',r:rnd(1.5,3)});
  }
}

function spawnSmoke(x,y){
  for(let i=0;i<3;i++){
    let a=Math.random()*Math.PI*2;
    PARTICLES.push({x,y,vx:Math.cos(a)*rnd(0.5,1.5),vy:Math.sin(a)*rnd(0.5,1.5),life:15,col:'#888',r:rnd(2,4)});
  }
}

function addKillFeed(name){
  killFeedEntries.unshift(name);
  if(killFeedEntries.length>4) killFeedEntries.pop();
  let kf = document.getElementById('kill-feed');
  kf.innerHTML = killFeedEntries.map(n=>`<div class="kill-entry">You eliminated ${n}</div>`).join('');
  setTimeout(()=>{kf.innerHTML='';killFeedEntries=[];},4000);
}

function rectCollide(bx,by,br,rx,ry,rw,rh){
  let cx=Math.max(rx,Math.min(bx,rx+rw));
  let cy=Math.max(ry,Math.min(by,ry+rh));
  return Math.hypot(bx-cx,by-cy)<br;
}

function bulletHitsBuilding(b){
  return BUILDINGS.some(bg=>rectCollide(b.x,b.y,3,bg.x,bg.y,bg.w,bg.h));
}

function playerBlockedByBuilding(nx,ny,r){
  return BUILDINGS.some(bg=>{
    let cx2=Math.max(bg.x,Math.min(nx,bg.x+bg.w));
    let cy2=Math.max(bg.y,Math.min(ny,bg.y+bg.h));
    return Math.hypot(nx-cx2,ny-cy2)<r;
  });
}

let lastTime=0;
function loop(ts){
  let dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;
  if(state!=='playing'){requestAnimationFrame(loop);return;}
  gameTime+=dt;

  // Zone shrinking
  zoneTimer-=dt/60;
  if(zoneTimer<=0){
    zonePhaseIdx=Math.min(zonePhaseIdx+1,ZONE_PHASES.length-1);
    let ph=ZONE_PHASES[zonePhaseIdx];
    zone={...ph.from};zoneTarget={...ph.to};
    zoneShrinkProgress=0;zoneShrinkDuration=ph.delay||10;
    zoneTimer=ph.delay||10;
  }
  zoneShrinkProgress=Math.min(1,(ZONE_PHASES[zonePhaseIdx].delay-zoneTimer)/Math.max(ZONE_PHASES[zonePhaseIdx].delay,1));
  let t2=zoneShrinkProgress;
  let ph=ZONE_PHASES[zonePhaseIdx];
  zone.cx=ph.from.cx+(ph.to.cx-ph.from.cx)*t2;
  zone.cy=ph.from.cy+(ph.to.cy-ph.from.cy)*t2;
  zone.r=ph.from.r+(ph.to.r-ph.from.r)*t2;

  // Player movement
  if(!player.dead){
    let dx=0,dy=0;
    if(keys['w']||keys['arrowup']) dy-=1;
    if(keys['s']||keys['arrowdown']) dy+=1;
    if(keys['a']||keys['arrowleft']) dx-=1;
    if(keys['d']||keys['arrowright']) dx+=1;
    if(dx||dy){let l=Math.hypot(dx,dy);dx/=l;dy/=l;}
    let nx=player.x+dx*player.speed*dt;
    let ny=player.y+dy*player.speed*dt;
    nx=Math.max(10,Math.min(WORLD-10,nx));
    ny=Math.max(10,Math.min(WORLD-10,ny));
    if(!playerBlockedByBuilding(nx,ny,player.r)){player.x=nx;player.y=ny;}

    // Player angle
    let wx=mouseX+camX, wy=mouseY+camY;
    player.angle=Math.atan2(wy-player.y,wx-player.x);

    // Shooting
    if(mouseDown && !reloading && player.ammo>0){
      shootCooldown-=dt;
      if(shootCooldown<=0){
        fireBullet(player,player.angle,true);
        spawnSmoke(player.x,player.y);
        player.ammo--;
        shootCooldown=8;
      }
    }

    // Reload
    if(reloading){
      reloadTimer-=dt;
      if(reloadTimer<=0){
        let need=30-player.ammo;let take=Math.min(need,player.ammoRes);
        player.ammo+=take;player.ammoRes-=take;reloading=false;
      }
    }

    // Loot pickup
    if(keys['e']||keys[' ']){
      LOOT.forEach(l=>{
        if(!l.collected&&dist(player,l)<20){
          l.collected=true;
          if(l.type==='ammo') player.ammoRes=Math.min(120,player.ammoRes+30);
          if(l.type==='hp') player.hp=Math.min(player.maxHp,player.hp+40);
          if(l.type==='armor') player.armor=Math.min(player.maxArmor,player.armor+50);
          spawnBlood(l.x,l.y,3);
        }
      });
    }

    // Zone damage
    if(!isInZone(player)){
      player.hp-=0.05*dt;
      document.getElementById('zone-warn').style.opacity='1';
    } else {
      document.getElementById('zone-warn').style.opacity='0';
    }

    if(player.hp<=0){player.dead=true;endGame(false);}
  }

  // Camera
  camX=Math.max(0,Math.min(WORLD-W,player.x-W/2));
  camY=Math.max(0,Math.min(WORLD-H,player.y-H/2));

  // Enemies AI
  ENEMIES.forEach(e=>{
    if(e.dead) return;
    let dp=dist(e,player);
    // Zone damage on enemy
    if(!isInZone(e)) e.hp-=0.03*dt;
    if(e.hp<=0){e.dead=true;return;}

    e.fireCooldown-=dt;
    let canSeePlayer=dp<e.alertRadius;

    if(canSeePlayer){
      e.state='chase';
      let ang=Math.atan2(player.y-e.y,player.x-e.x);
      e.angle=ang;
      if(dp>80){
        let nx2=e.x+Math.cos(ang)*e.speed*dt;
        let ny2=e.y+Math.sin(ang)*e.speed*dt;
        if(!playerBlockedByBuilding(nx2,ny2,e.r)){e.x=nx2;e.y=ny2;}
      }
      if(e.fireCooldown<=0&&dp<220&&e.ammo>0){
        let spread=(Math.random()-0.5)*0.2;
        fireBullet(e,ang+spread,false);
        e.ammo--;e.fireCooldown=e.fireRate;
      }
    } else {
      e.state='wander';
      e.wanderTimer-=dt;
      if(e.wanderTimer<=0){
        e.wanderTarget={x:rnd(100,1300),y:rnd(100,1300)};
        e.wanderTimer=rndInt(60,180);
      }
      let ang2=Math.atan2(e.wanderTarget.y-e.y,e.wanderTarget.x-e.x);
      e.angle=ang2;
      let nx3=e.x+Math.cos(ang2)*e.speed*0.5*dt;
      let ny3=e.y+Math.sin(ang2)*e.speed*0.5*dt;
      if(!playerBlockedByBuilding(nx3,ny3,e.r)){e.x=nx3;e.y=ny3;}
    }
    // Enemy vs Enemy collision (basic)
    ENEMIES.forEach(e2=>{
      if(e2===e||e2.dead) return;
      let d2=dist(e,e2);
      if(d2<e.r+e2.r+2){let a=Math.atan2(e.y-e2.y,e.x-e2.x);e.x+=Math.cos(a)*0.5;e.y+=Math.sin(a)*0.5;}
    });
  });

  // Bullets
  for(let i=BULLETS.length-1;i>=0;i--){
    let b=BULLETS[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||b.x<0||b.y<0||b.x>WORLD||b.y>WORLD||bulletHitsBuilding(b)){BULLETS.splice(i,1);continue;}
    if(b.isPlayer){
      let hit=false;
      ENEMIES.forEach(e=>{
        if(e.dead||hit) return;
        if(dist(b,e)<e.r+3){
          hit=true;
          spawnBlood(b.x,b.y);
          let dmg=b.dmg;
          if(e.armor>0){let absorbed=Math.min(e.armor,dmg*0.6);e.armor-=absorbed;dmg-=absorbed;}
          e.hp-=dmg;
          if(e.hp<=0){e.dead=true;kills++;addKillFeed(e.name);spawnBlood(e.x,e.y,12);}
        }
      });
      if(hit){BULLETS.splice(i,1);}
    } else {
      if(!player.dead&&dist(b,player)<player.r+3){
        spawnBlood(b.x,b.y,4);
        let dmg=b.dmg;
        if(player.armor>0){let absorbed=Math.min(player.armor,dmg*0.6);player.armor-=absorbed;dmg-=absorbed;}
        player.hp-=dmg;
        if(player.hp<=0){player.dead=true;endGame(false);}
        BULLETS.splice(i,1);
      }
    }
  }

  // Particles
  for(let i=PARTICLES.length-1;i>=0;i--){
    let p=PARTICLES[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0) PARTICLES.splice(i,1);
  }

  // Check win
  if(ENEMIES.filter(e=>!e.dead).length===0){endGame(true);}

  updateHUD();
  draw();
  requestAnimationFrame(loop);
}

function endGame(won){
  state='over';
  let ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`<h1 style="color:${won?'#ffd700':'#ff4444'}">${won?'🏆 WINNER!':'☠ ELIMINATED'}</h1>
  <p style="color:#ccc">${won?'You are the last one standing!':'You were taken out...'}<br>Kills: ${kills} | Survived: ${Math.floor(gameTime/60)}m ${Math.floor(gameTime%60)}s</p>
  <button id="start-btn" style="pointer-events:all">PLAY AGAIN</button>`;
  document.getElementById('start-btn').onclick=startGame;
}

// DRAWING
function drawGround(){
  ctx.fillStyle='#3d5a2a';ctx.fillRect(0,0,WORLD,WORLD);
  // terrain patches
  for(let i=0;i<80;i++){
    let tx=(i*137)%WORLD,ty=(i*211+i*31)%WORLD;
    ctx.fillStyle=`rgba(60,90,30,${0.2+Math.random()*0.1})`;
    ctx.beginPath();ctx.ellipse(tx,ty,30+i%20,20+i%15,i*0.1,0,Math.PI*2);ctx.fill();
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(-camX,-camY);

  // Ground
  drawGround();

  // Zone (safe area highlight)
  ctx.save();
  ctx.globalAlpha=0.08;
  ctx.fillStyle='#0055ff';
  ctx.beginPath();ctx.arc(zone.cx,zone.cy,zone.r,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.strokeStyle='rgba(0,100,255,0.7)';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(zone.cx,zone.cy,zone.r,0,Math.PI*2);ctx.stroke();

  // Zone outside (damage area)
  ctx.save();
  ctx.globalAlpha=0.18;
  ctx.fillStyle='#ff2200';
  ctx.beginPath();
  ctx.rect(0,0,WORLD,WORLD);
  ctx.arc(zone.cx,zone.cy,zone.r,0,Math.PI*2,true);
  ctx.fill('evenodd');
  ctx.restore();

  // Buildings
  BUILDINGS.forEach(b=>{
    ctx.fillStyle='#5a4a38';ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle='#3d3028';ctx.lineWidth=2;ctx.strokeRect(b.x,b.y,b.w,b.h);
    // roof detail
    ctx.fillStyle='#6b5a45';ctx.fillRect(b.x+4,b.y+4,b.w-8,b.h-8);
    ctx.strokeStyle='rgba(255,230,150,0.15)';ctx.lineWidth=1;ctx.strokeRect(b.x+4,b.y+4,b.w-8,b.h-8);
  });

  // Trees
  TREES.forEach(t=>{
    ctx.fillStyle=`rgba(20,80,20,0.6)`;
    ctx.beginPath();ctx.arc(t.x,t.y,t.r+4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgb(${30+t.c*30|0},${100+t.c*60|0},${30+t.c*20|0})`;
    ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();
  });

  // Loot
  LOOT.forEach(l=>{
    if(l.collected) return;
    let cols={ammo:'#ffd700',hp:'#ff3366',armor:'#00aaff'};
    let icons={ammo:'A',hp:'+',armor:'■'};
    ctx.fillStyle=cols[l.type]||'#fff';
    ctx.shadowColor=cols[l.type];ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(l.x,l.y,l.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#000';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(icons[l.type],l.x,l.y);
    // nearby indicator for player
    if(dist(player,l)<30){
      ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;
      ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.arc(l.x,l.y,l.r+5,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
    }
  });

  // Particles
  PARTICLES.forEach(p=>{
    let alpha=p.life/20;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });

  // Bullets
  BULLETS.forEach(b=>{
    ctx.fillStyle=b.isPlayer?'#ffee00':'#ff6600';
    ctx.shadowColor=b.isPlayer?'#ffcc00':'#ff4400';ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    // trail
    ctx.strokeStyle=b.isPlayer?'rgba(255,220,0,0.4)':'rgba(255,100,0,0.4)';
    ctx.lineWidth=2;ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.vx*2,b.y-b.vy*2);ctx.stroke();
  });
  ctx.shadowBlur=0;

  // Enemies
  ENEMIES.forEach(e=>{
    if(e.dead) return;
    let inScreen=(e.x-camX>-40&&e.x-camX<W+40&&e.y-camY>-40&&e.y-camY<H+40);
    if(!inScreen) return;
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(e.x,e.y+e.r,e.r*0.8,e.r*0.3,0,0,Math.PI*2);ctx.fill();
    // body
    ctx.fillStyle=e.state==='chase'?'#cc3300':'#884422';
    ctx.strokeStyle='#ff6600';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    // direction
    ctx.strokeStyle='#ffaa00';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(e.x,e.y);ctx.lineTo(e.x+Math.cos(e.angle)*e.r*1.5,e.y+Math.sin(e.angle)*e.r*1.5);ctx.stroke();
    // health bar
    let bw=28,bh=4,bx=e.x-bw/2,by=e.y-e.r-8;
    ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=e.hp/e.maxHp>0.5?'#2ecc40':'#ff4136';
    ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
    // name
    ctx.fillStyle='rgba(255,220,150,0.9)';ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText(e.name,e.x,e.y-e.r-11);
  });

  // Player
  if(!player.dead){
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(player.x,player.y+player.r,player.r*0.9,player.r*0.35,0,0,Math.PI*2);ctx.fill();
    // body glow
    ctx.shadowColor='rgba(50,200,255,0.5)';ctx.shadowBlur=10;
    ctx.fillStyle='#1a7aff';ctx.strokeStyle='#66ccff';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    // direction/gun
    ctx.strokeStyle='#88ddff';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(player.x,player.y);
    ctx.lineTo(player.x+Math.cos(player.angle)*(player.r+12),player.y+Math.sin(player.angle)*(player.r+12));
    ctx.stroke();
    // gun rectangle
    ctx.save();
    ctx.translate(player.x+Math.cos(player.angle)*player.r,player.y+Math.sin(player.angle)*player.r);
    ctx.rotate(player.angle);
    ctx.fillStyle='#88ccff';ctx.fillRect(0,-2,14,4);ctx.restore();

    // crosshair at mouse
    let cx2=mouseX+camX,cy2=mouseY+camY;
    ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx2-8,cy2);ctx.lineTo(cx2+8,cy2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx2,cy2-8);ctx.lineTo(cx2,cy2+8);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.arc(cx2,cy2,14,0,Math.PI*2);ctx.stroke();
  }

  ctx.restore();

  // Minimap
  drawMinimap();
}

function drawMinimap(){
  const S=100/WORLD;
  mctx.fillStyle='rgba(20,30,10,0.85)';mctx.fillRect(0,0,100,100);
  // zone
  mctx.strokeStyle='rgba(0,120,255,0.8)';mctx.lineWidth=1.5;
  mctx.beginPath();mctx.arc(zone.cx*S,zone.cy*S,zone.r*S,0,Math.PI*2);mctx.stroke();
  // buildings
  mctx.fillStyle='rgba(100,80,50,0.6)';
  BUILDINGS.forEach(b=>mctx.fillRect(b.x*S,b.y*S,b.w*S,b.h*S));
  // enemies
  ENEMIES.forEach(e=>{
    if(e.dead) return;
    mctx.fillStyle='#ff5500';
    mctx.beginPath();mctx.arc(e.x*S,e.y*S,2,0,Math.PI*2);mctx.fill();
  });
  // loot
  LOOT.forEach(l=>{
    if(l.collected) return;
    let c={ammo:'#ffd700',hp:'#ff3366',armor:'#00aaff'}[l.type];
    mctx.fillStyle=c;
    mctx.fillRect(l.x*S-1,l.y*S-1,2,2);
  });
  // player
  mctx.fillStyle='#3399ff';
  mctx.beginPath();mctx.arc(player.x*S,player.y*S,3,0,Math.PI*2);mctx.fill();
  // viewport rect
  mctx.strokeStyle='rgba(255,255,255,0.3)';mctx.lineWidth=0.5;
  mctx.strokeRect(camX*S,camY*S,W*S,H*S);
}

// INPUT
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='r'&&!reloading&&player.ammo<30&&player.ammoRes>0){
    reloading=true;reloadTimer=120;
  }
  if(e.key===' ') e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
canvas.addEventListener('mousemove',e=>{
  let rect=canvas.getBoundingClientRect();
  let scaleX=W/rect.width;
  mouseX=(e.clientX-rect.left)*scaleX;
  mouseY=(e.clientY-rect.top)*scaleX;
});
canvas.addEventListener('mousedown',e=>{mouseDown=true;e.preventDefault();});
canvas.addEventListener('mouseup',e=>{mouseDown=false;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// Mobile controls
let joystickActive=false,jstartX=0,jstartY=0;
const jzone=document.getElementById('joystick-zone');
const jknob=document.getElementById('joystick-knob');
if(jzone){
  jzone.addEventListener('touchstart',e=>{
    joystickActive=true;
    let t=e.touches[0],r=jzone.getBoundingClientRect();
    jstartX=t.clientX-r.left;jstartY=t.clientY-r.top;
    e.preventDefault();
  },{passive:false});
  jzone.addEventListener('touchmove',e=>{
    if(!joystickActive) return;
    let t=e.touches[0],r=jzone.getBoundingClientRect();
    let dx2=t.clientX-r.left-jstartX,dy2=t.clientY-r.top-jstartY;
    let mag=Math.hypot(dx2,dy2);let maxR=35;
    if(mag>maxR){dx2=dx2/mag*maxR;dy2=dy2/mag*maxR;}
    jknob.style.left=(30+dx2)+'px';jknob.style.top=(30+dy2)+'px';
    keys['w']=dy2<-8;keys['s']=dy2>8;keys['a']=dx2<-8;keys['d']=dx2>8;
    e.preventDefault();
  },{passive:false});
  jzone.addEventListener('touchend',()=>{
    joystickActive=false;jknob.style.left='30px';jknob.style.top='30px';
    keys['w']=keys['s']=keys['a']=keys['d']=false;
  });
}
const fbtn=document.getElementById('fire-btn');
if(fbtn){
  fbtn.addEventListener('touchstart',e=>{mouseDown=true;e.preventDefault();},{passive:false});
  fbtn.addEventListener('touchend',()=>mouseDown=false);
}

document.getElementById('start-btn').onclick=startGame;
requestAnimationFrame(loop);
</script>
